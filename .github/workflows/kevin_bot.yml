# GitHub Actions Workflow — Meet Kevin Summarizer Bot
# Checks for new videos every hour
# Only processes videos published on or after June 4th 2026

name: Meet Kevin Summarizer

on:
  schedule:
    - cron: '0 * * * *'   # Every hour

  # Manual trigger — choose normal run or test mode
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'test'
        type: choice
        options:
          - test    # Summarizes latest video, does NOT update seen_videos.json
          - normal  # Full normal run, updates seen_videos.json

jobs:
  check-and-summarize:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Needed to commit seen_videos.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "arg=${{ github.event.inputs.mode == 'test' && 'test' || '' }}" >> $GITHUB_OUTPUT
          else
            echo "arg=" >> $GITHUB_OUTPUT
          fi

      - name: Run Kevin bot
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          EMAIL_SENDER:     ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT:  ${{ secrets.EMAIL_RECIPIENT }}
          KEVIN_NTFY:       ${{ secrets.KEVIN_NTFY }}
        run: python src/kevin_bot.py ${{ steps.mode.outputs.arg }}

      # Only commit seen_videos.json on normal runs (not test mode)
      - name: Save seen videos list
        if: github.event.inputs.mode != 'test'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_videos.json
          git diff --staged --quiet || git commit -m "Update seen videos [skip ci]"
          git push
